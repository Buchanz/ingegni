<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class App</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="megaphone.png" type="image/png">
</head>
<body>
    <header class="app-header">
        <h1 class="app-title">
            <img src="megaphone.png" alt="" class="app-title-icon">
            <span>Class App</span>
        </h1>
        <div id="session-panel" class="session-panel">
            <p id="session-status">Checking session...</p>
            <button id="logout-button" type="button" hidden>Log out</button>
        </div>
    </header>

    <main>
        <section id="auth-card" class="auth-card">
            <div class="auth-tabs" role="tablist" aria-label="Account forms">
                <button id="show-login" class="tab-button active" type="button">Log in</button>
                <button id="show-signup" class="tab-button" type="button">Sign up</button>
            </div>

            <form id="auth-form">
                <label for="auth-username">Username</label>
                <input type="text" name="username" id="auth-username" autocomplete="username" required>

                <label id="auth-email-label" for="auth-email" hidden>Email</label>
                <input type="email" name="email" id="auth-email" autocomplete="email" hidden>

                <label for="auth-password">Password</label>
                <input type="password" name="password" id="auth-password" autocomplete="current-password" required minlength="6">

                <button id="auth-submit" type="submit">Log in</button>
                <button id="google-login" class="secondary-button" type="button">Continue with Google</button>
                <button id="resend-verification" class="secondary-button" type="button">Resend verification email</button>
                <p id="auth-message" class="form-message" aria-live="polite"></p>
            </form>
        </section>

        <section id="post-panel" class="post-panel" hidden>
            <form id="new-post-form">
                <label for="post-body">Post body</label>
                <textarea name="body" id="post-body" rows="5" required></textarea>
                <button type="submit">Post</button>
                <p id="post-message" class="form-message" aria-live="polite"></p>
            </form>
        </section>

        <ul id="all-posts"></ul>
    </main>
</body>
</html>
